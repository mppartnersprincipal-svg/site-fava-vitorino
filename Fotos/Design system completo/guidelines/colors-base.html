<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);display:flex;gap:12px;padding:16px;background:#fff}
.sw{flex:1;height:118px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
.sw b{font:600 13px/1.2 var(--font-title);letter-spacing:.06em}
.sw span{font:400 11px/1.4 var(--font-body);opacity:.75}</style></head><body>
<div class="sw" style="background:var(--verde-900);color:var(--areia-100)"><b>VERDE</b><span>#083224 · --verde-900</span></div>
<div class="sw" style="background:var(--dourado-500);color:var(--verde-900)"><b>DOURADO</b><span>#e5b775 · --dourado-500</span></div>
<div class="sw" style="background:var(--areia-100);color:var(--verde-900);border:1px solid var(--border-subtle)"><b>AREIA</b><span>#efebe5 · --areia-100</span></div>
</body></html>
