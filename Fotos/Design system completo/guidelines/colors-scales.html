<!-- @dsCard group="Colors" viewport="700x170" subtitle="Escalas derivadas de verde e dourado" name="Escalas" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);padding:16px;background:#fff;display:flex;flex-direction:column;gap:10px}
.row{display:flex;gap:8px}.c{flex:1;height:56px;border-radius:var(--radius-sm);display:flex;align-items:flex-end;padding:6px 8px;box-sizing:border-box;font:500 10px/1 var(--font-body)}</style></head><body>
<div class="row">
<div class="c" style="background:var(--verde-900);color:var(--areia-100)">900</div>
<div class="c" style="background:var(--verde-800);color:var(--areia-100)">800</div>
<div class="c" style="background:var(--verde-700);color:var(--areia-100)">700</div>
<div class="c" style="background:var(--verde-100);color:var(--verde-900)">100</div>
</div>
<div class="row">
<div class="c" style="background:var(--dourado-600);color:var(--verde-900)">600</div>
<div class="c" style="background:var(--dourado-500);color:var(--verde-900)">500</div>
<div class="c" style="background:var(--dourado-300);color:var(--verde-900)">300</div>
<div class="c" style="background:var(--areia-50);color:var(--verde-900);border:1px solid var(--border-subtle)">areia-50</div>
</div>
</body></html>
