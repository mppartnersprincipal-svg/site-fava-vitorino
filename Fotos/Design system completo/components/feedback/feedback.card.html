<!-- @dsCard group="Components" viewport="700x340" name="Feedback" subtitle="Toast, Tooltip, Switch, Accordion" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page);padding:20px}</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="../../ds-loader.js"></script>
</head><body><div id="root"></div>
<script type="text/babel">
loadDS('../../').then((DS)=>{
const {Toast,Tooltip,Switch,Accordion,Badge}=DS;
function Demo(){
  const [on,setOn]=React.useState(true);
  return <div style={{display:'flex',flexDirection:'column',gap:20}}>
    <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
      <Toast tone="success" title="Mensagem enviada" onClose={()=>{}}>Respondemos em até um dia útil.</Toast>
      <Toast tone="error" title="Erro no envio">Verifique os campos e tente novamente.</Toast>
    </div>
    <div style={{display:'flex',gap:24,alignItems:'center',flexWrap:'wrap'}}>
      <Switch checked={on} onChange={setOn} label="Receber atualizações por e-mail"/>
      <Tooltip text="Atendimento em todo o Brasil"><Badge tone="gold">Nacional</Badge></Tooltip>
    </div>
    <Accordion items={[
      {title:'Quanto custa a primeira conversa?',content:'A primeira conversa serve para entender o caso — sem compromisso.'},
      {title:'Atendem fora do Paraná?',content:'Sim, atuação em todo o Brasil, com atendimento remoto.'},
    ]}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
});
</script></body></html>
