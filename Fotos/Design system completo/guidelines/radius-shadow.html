<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);padding:20px 24px;background:var(--surface-page);display:flex;gap:16px;align-items:center}
.b{background:#fff;width:130px;height:110px;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;font:400 10px/1.5 var(--font-body);color:var(--text-muted)}</style></head><body>
<div class="b" style="border-radius:var(--radius-sm);border:1px solid var(--border-subtle)">--radius-sm · 2px<br>borda sutil</div>
<div class="b" style="border-radius:var(--radius-md);border:1px solid var(--border-subtle)">--radius-md · 4px<br>cards</div>
<div class="b" style="border-radius:var(--radius-md);box-shadow:var(--shadow-card)">--shadow-card<br>hover / destaque</div>
<div class="b" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-dialog)">--radius-lg 8px<br>--shadow-dialog</div>
</body></html>
