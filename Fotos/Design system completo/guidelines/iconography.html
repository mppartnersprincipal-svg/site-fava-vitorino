<!-- @dsCard group="Brand" viewport="700x200" subtitle="Lucide, traço 1.5 — verde sobre claro, dourado sobre escuro" name="Iconografia" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);display:flex;height:200px}
.p{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.row{display:flex;gap:22px;align-items:center}
.lbl{font:400 11px/1 var(--font-body)}</style></head><body>
<div class="p" style="background:#fff;color:var(--verde-900)">
<div class="row" id="light"></div><span class="lbl" style="color:var(--text-muted)">Sobre claro — stroke 1.5 · 24px · verde-900</span>
</div>
<div class="p" style="background:var(--verde-900);color:var(--dourado-500)">
<div class="row" id="dark"></div><span class="lbl" style="color:var(--text-on-dark-muted)">Sobre escuro — dourado-500 ou areia</span>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
const names=['scale','landmark','file-text','handshake','shield-check','phone'];
for(const id of ['light','dark']){
  const el=document.getElementById(id);
  el.innerHTML=names.map(n=>'<i data-lucide="'+n+'"></i>').join('');
}
lucide.createIcons({attrs:{width:24,height:24,'stroke-width':1.5}});
</script></body></html>
