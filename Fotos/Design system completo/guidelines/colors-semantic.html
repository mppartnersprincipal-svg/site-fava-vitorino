<!-- @dsCard group="Colors" viewport="700x190" subtitle="Aliases semânticos em uso" name="Tokens semânticos" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);display:flex;gap:12px;padding:16px;background:var(--surface-page)}
.half{flex:1;border-radius:var(--radius-md);padding:16px;box-sizing:border-box}
.tok{font:400 11px/1.9 var(--font-body)}</style></head><body>
<div class="half" style="background:var(--surface-card);border:1px solid var(--border-subtle)">
<div style="font:var(--text-h3);letter-spacing:var(--tracking-title);text-transform:uppercase;color:var(--text-title)">Sobre claro</div>
<div class="tok" style="color:var(--text-body)">--text-body · corpo de texto</div>
<div class="tok" style="color:var(--text-muted)">--text-muted · apoio</div>
<div class="tok" style="color:var(--accent-strong)">--accent-strong · links e fios</div>
</div>
<div class="half" style="background:var(--surface-dark)">
<div style="font:var(--text-h3);letter-spacing:var(--tracking-title);text-transform:uppercase;color:var(--text-on-dark)">Sobre escuro</div>
<div class="tok" style="color:var(--text-on-dark)">--text-on-dark</div>
<div class="tok" style="color:var(--text-on-dark-muted)">--text-on-dark-muted</div>
<div class="tok" style="color:var(--accent)">--accent · dourado pleno</div>
</div>
</body></html>
