<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--surface-page);height:400px}</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="../../ds-loader.js"></script>
</head><body><div id="root"></div>
<script type="text/babel">
loadDS('../../').then((DS)=>{
const {Dialog,Button,Input}=DS;
function Demo(){
  const [open,setOpen]=React.useState(true);
  return <div>
    <div style={{padding:20}}><Button variant="primary" onClick={()=>setOpen(true)}>Agendar conversa</Button></div>
    <Dialog open={open} onClose={()=>setOpen(false)} title="Agendar conversa"
      footer={<><Button variant="ghost" size="sm" onClick={()=>setOpen(false)}>Cancelar</Button><Button variant="gold" size="sm">Enviar</Button></>}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Input label="Nome" placeholder="Seu nome completo"/>
        <Input label="Telefone" placeholder="(41) 99999-9999"/>
      </div>
    </Dialog>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
});
</script></body></html>
